name: fixbuddy
description: FixBuddy - Your Friendly Local Service Helper
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.0.0

  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  # Navigation
  go_router: ^12.0.0

  # UI & Design
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  lottie: ^3.0.0
  fl_chart: ^0.66.0

  # Media
  image_picker: ^1.0.4

  # Utilities
  url_launcher: ^6.2.0
  share_plus: ^13.1.0
  path_provider: ^2.1.5
  intl: ^0.20.2
  uuid: ^4.2.1
  connectivity_plus: ^7.1.1
  permission_handler: ^11.1.0
  shared_preferences: ^2.2.2
  flutter_dotenv: ^5.1.0

  # Push Notifications
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - .env
